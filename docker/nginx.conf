server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # yacd SPA - 所有路径指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
